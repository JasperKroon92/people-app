<title>People</title>

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "People",
  short_name: "People",
  description: "Your personal relationship intelligence app",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#ffffff",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23f0effe'/%3E%3Ccircle cx='256' cy='200' r='80' fill='%237F77DD'/%3E%3Cellipse cx='256' cy='390' rx='130' ry='80' fill='%237F77DD'/%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestUrl = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestUrl;
document.head.appendChild(link);
</script>

<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-tertiary: #efefef;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --text-tertiary: #999999;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --accent: #7F77DD;
    --accent-bg: #f0effe;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-secondary: #252525;
      --bg-tertiary: #2e2e2e;
      --text: #f0f0f0;
      --text-secondary: #aaaaaa;
      --text-tertiary: #777777;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.28);
      --accent: #9d97e8;
      --accent-bg: #2a2840;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
  input, textarea, select { font-family: inherit; font-size: 15px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; width: 100%; outline: none; -webkit-appearance: none; }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(127,119,221,0.12); }
  textarea { resize: none; line-height: 1.55; }
  button { font-family: inherit; cursor: pointer; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; transition: all 0.15s; border: none; -webkit-appearance: none; }
  button:active { transform: scale(0.97); }

  #app { height: 100%; display: flex; flex-direction: column; }
  #screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 80px; padding-top: max(16px, env(safe-area-inset-top)); }
  #bottom-nav { height: calc(64px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom); background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding-top: 4px; flex-shrink: 0; }

  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 16px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; font-size: 10px; color: var(--text-tertiary); font-family: inherit; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .btn-primary { background: var(--text); color: var(--bg); padding: 13px 20px; width: 100%; font-size: 15px; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 11px 16px; }
  .btn-ghost { background: transparent; color: var(--text-secondary); padding: 6px 10px; font-size: 14px; }

  .section-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
  .tag { display: inline-flex; align-items: center; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text-secondary); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .field-gap { margin-bottom: 14px; }

  .contact-row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .contact-row:last-child { border-bottom: none; }
  .contact-row:active { opacity: 0.6; }

  .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; }
  .sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 16px; padding-bottom: calc(32px + env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .sheet-handle { width: 40px; height: 4px; background: var(--border-hover); border-radius: 2px; margin: 0 auto 18px; }

  .warmth-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .w-hot { background: #1D9E75; } .w-warm { background: #BA7517; } .w-cold { background: #888780; } .w-new { background: #7F77DD; }

  .save-bar { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-tertiary); padding: 6px 0 2px; }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); }
  .save-dot.saving { background: #BA7517; } .save-dot.saved { background: #1D9E75; } .save-dot.error { background: #c0392b; }

  .lights-accent { border-left: 3px solid var(--accent); padding: 10px 12px; background: var(--accent-bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .prep-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .prep-row:last-child { border-bottom: none; }
  .prep-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); min-width: 82px; padding-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .prep-val { font-size: 14px; line-height: 1.6; flex: 1; }

  .nudge-sheet .sheet { background: var(--bg); }
  .log-entry { padding: 10px 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .log-date { font-size: 11px; color: var(--text-tertiary); margin-bottom: 3px; }
  .log-text { font-size: 13px; line-height: 1.55; }

  .toast { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 9px 18px; border-radius: 20px; font-size: 13px; z-index: 200; white-space: nowrap; transition: opacity 0.3s; pointer-events: none; }

  .page-header { padding-top: 8px; margin-bottom: 16px; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-subtitle { font-size: 13px; color: var(--text-tertiary); margin-top: 3px; }
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-capture" onclick="goTo('capture')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Capture
    </button>
    <button class="nav-btn" id="nav-people" onclick="goTo('people')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      People
    </button>
    <button class="nav-btn" id="nav-followups" onclick="goTo('followups')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Follow-ups
    </button>
    <button class="nav-btn" id="nav-settings" onclick="goTo('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<script>
const DRIVE_FILENAME = 'people-app-data.json';
const CACHE_KEY = 'ppl_v4_data';
let contacts = [];
let currentView = 'capture';
let driveFileId = null;
let isDirty = false;
let isSaving = false;
let lastSaved = null;
let saveStatusEl = null;
let saveDotEl = null;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const FG = ['#534AB7','#0F6E56','#993C1D','#185FA5','#993556','#854F0B','#3B6D11','#5F5E5A'];
const BG = ['#EEEDFE','#E1F5EE','#FAECE7','#E6F1FB','#FBEAF0','#FAEEDA','#EAF3DE','#F1EFE8'];
const BG_DARK = ['#2a2840','#0d2a20','#2a1a10','#0d1f35','#2a1020','#2a1e05','#182205','#1e1e1c'];

const NUDGES = [
  { q: "What did they seem most enthusiastic about?", hint: "People's passions reveal what makes them feel important." },
  { q: "Did you learn something they're genuinely proud of?", hint: "Remembering achievements makes people feel truly seen." },
  { q: "Was there a moment they really lit up?", hint: "That's usually the thing worth remembering most." },
  { q: "What did you two have in common?", hint: "Genuine common ground is the fastest way to build trust." },
  { q: "Did you let them talk more than you?", hint: "The best conversationalists are the best listeners." },
];

function todayStr() { return new Date().toISOString().split('T')[0]; }
function isDark() { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
function col(c) {
  const i = Math.abs(((c.firstname||'A').charCodeAt(0) + (c.lastname||'').charCodeAt(0))) % FG.length;
  return { fg: FG[i], bg: isDark() ? BG_DARK[i] : BG[i] };
}
function initials(c) { return (((c.firstname||'')[0]||'') + ((c.lastname||'')[0]||'')).toUpperCase(); }
function fmtMonth(w) { if(!w) return ''; const [y,m] = w.split('-'); return `${MONTHS[parseInt(m)-1]} ${y}`; }
function daysAgo(d) { if(!d) return null; return Math.round((Date.now() - new Date(d).getTime()) / 86400000); }
function daysUntil(d) { if(!d) return null; const t = new Date(); t.setHours(0,0,0,0); const u = new Date(d); u.setHours(0,0,0,0); return Math.round((u - t) / 86400000); }
function warmth(c) {
  if(c.warmth_override) return c.warmth_override;
  const log = c.contact_log || [];
  if(!log.length) return 'new';
  const da = daysAgo(log[log.length-1].date);
  if(da <= 30) return 'hot'; if(da <= 90) return 'warm'; return 'cold';
}
function warmthLabel(w) { return {hot:'Active',warm:'Warm',cold:'Cold',new:'New'}[w]||'New'; }
function warmthClass(w) { return {hot:'w-hot',warm:'w-warm',cold:'w-cold',new:'w-new'}[w]||'w-new'; }

function setSaveStatus(status, text) {
  if(!saveStatusEl) return;
  saveDotEl.className = 'save-dot ' + status;
  saveStatusEl.textContent = text;
}

async function callClaude(prompt, maxTokens = 2000) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: maxTokens,
      mcp_servers: [{ type: 'url', url: 'https://drive.mcp.claude.com/mcp', name: 'gdrive' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const d = await r.json();
  return (d.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
}

async function findOrCreateFile() {
  const text = await callClaude(`Search my Google Drive for a file named exactly "${DRIVE_FILENAME}". If found return ONLY JSON {"found":true,"id":"FILE_ID"}. If not found, create it with content [] and return ONLY JSON {"found":false,"id":"NEW_ID"}. Raw JSON only.`);
  const json = JSON.parse(text.replace(/```json|```/g,'').trim());
  driveFileId = json.id;
  return json;
}

async function loadFromDrive() {
  setSaveStatus('saving', 'Connecting...');
  try {
    const result = await findOrCreateFile();
    if(result.found) {
      const text = await callClaude(`Read contents of Google Drive file ID "${driveFileId}". Return ONLY the raw file content.`);
      try { const p = JSON.parse(text.replace(/```json|```/g,'').trim()); contacts = Array.isArray(p) ? p : []; } catch(e) { contacts = []; }
    } else { contacts = []; }
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e) {}
    setSaveStatus('saved', 'Synced'); lastSaved = Date.now();
  } catch(e) {
    setSaveStatus('error', 'Using local cache');
    try { const c = localStorage.getItem(CACHE_KEY); if(c) contacts = JSON.parse(c); } catch(e2) { contacts = []; }
  }
  render();
}

async function saveToDrive(manual = false) {
  if(!isDirty && !manual) return;
  if(isSaving) return;
  isSaving = true; setSaveStatus('saving', 'Saving...');
  try {
    if(!driveFileId) await findOrCreateFile();
    await callClaude(`Update Google Drive file ID "${driveFileId}" replacing all content with: ${JSON.stringify(contacts)}. Confirm done.`);
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e) {}
    isDirty = false; lastSaved = Date.now(); setSaveStatus('saved', 'Saved');
    if(manual) showToast('Saved to Drive');
  } catch(e) {
    setSaveStatus('error', 'Save failed');
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e2) {}
    if(manual) showToast('Drive failed — cached locally');
  } finally { isSaving = false; }
}

function markDirty() {
  isDirty = true; setSaveStatus('saving', 'Unsaved');
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e) {}
}

function goTo(view) {
  if(isDirty && view !== currentView) saveToDrive();
  currentView = view;
  ['capture','people','followups','settings'].forEach(v => {
    document.getElementById('nav-' + v).classList.toggle('active', v === view);
  });
  render();
}

function render() {
  const s = document.getElementById('screen');
  if(currentView === 'capture') s.innerHTML = renderCapture();
  else if(currentView === 'people') s.innerHTML = renderPeople();
  else if(currentView === 'followups') s.innerHTML = renderFollowups();
  else if(currentView === 'settings') s.innerHTML = renderSettings();
  saveStatusEl = document.getElementById('save-label');
  saveDotEl = document.getElementById('save-dot');
}

function renderSaveBar() {
  const txt = lastSaved ? `Saved ${new Date(lastSaved).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}` : (isDirty ? 'Unsaved changes' : 'Loading...');
  const cls = lastSaved && !isDirty ? 'saved' : (isDirty ? 'saving' : '');
  return `<div class="save-bar"><span class="save-dot ${cls}" id="save-dot"></span><span id="save-label" style="font-size:11px;color:var(--text-tertiary);">${txt}</span></div>`;
}

function renderCapture() {
  return `
  <div class="page-header">
    <div class="page-title">Quick capture</div>
    <div class="page-subtitle">Write down who you just met</div>
    ${renderSaveBar()}
  </div>
  <div class="field-gap">
    <textarea id="qc-text" rows="5" placeholder="Met Sarah at a dinner in Tribeca — she works in architecture, originally from Rotterdam, has a young daughter. We talked about the Hudson Yards development."></textarea>
  </div>
  <div class="field-gap">
    <input type="text" id="qc-existing" placeholder="Add to existing contact (optional)" oninput="showSuggestions(this.value)" autocomplete="off" />
  </div>
  <div id="qc-sugg" style="margin-bottom:8px;"></div>
  <div id="qc-status" style="font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:12px;display:none;"></div>
  <div style="display:flex;gap:10px;">
    <button class="btn-primary" style="flex:1;" onclick="doCapture()">Save with AI ↗</button>
    <button class="btn-secondary" onclick="openManual()">Manual</button>
  </div>`;
}

function showSuggestions(val) {
  const box = document.getElementById('qc-sugg');
  if(!val || val.length < 2) { box.innerHTML = ''; return; }
  const q = val.toLowerCase();
  const m = contacts.filter(c => `${c.firstname} ${c.lastname} ${c.company||''}`.toLowerCase().includes(q)).slice(0,3);
  if(!m.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;">` +
    m.map(c => `<div style="padding:11px 14px;cursor:pointer;font-size:14px;active:opacity:0.6;" onclick="pickExisting('${c.id}','${c.firstname} ${c.lastname}')">${c.firstname} ${c.lastname}${c.company ? ' · ' + c.company : ''}</div>`).join(`<div style="height:1px;background:var(--border);"></div>`) +
    `</div>`;
}

let selId = null;
function pickExisting(id, name) {
  selId = id;
  document.getElementById('qc-existing').value = name;
  document.getElementById('qc-sugg').innerHTML = '';
}

async function doCapture() {
  const text = document.getElementById('qc-text').value.trim();
  if(!text) return;
  const st = document.getElementById('qc-status');
  st.style.display = 'block';
  st.style.background = 'rgba(127,119,221,0.1)';
  st.style.color = 'var(--accent)';
  st.textContent = 'Parsing with AI...';

  if(selId) {
    const idx = contacts.findIndex(x => x.id === selId);
    if(idx > -1) {
      if(!contacts[idx].contact_log) contacts[idx].contact_log = [];
      contacts[idx].contact_log.push({ date: todayStr(), note: text });
      markDirty(); selId = null;
      document.getElementById('qc-text').value = '';
      document.getElementById('qc-existing').value = '';
      st.style.display = 'none';
      showToast('Note added'); return;
    }
  }

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{ role: 'user', content: `Extract info from this note about a person I just met. Today is ${todayStr()}. Return ONLY valid JSON: firstname, lastname, company, role, where (how/where we met), when (YYYY-MM if mentioned), topics (plain string), personal (family/hobbies/background, plain string), notes, reminder_date (YYYY-MM-DD ONLY if explicit follow-up mentioned, otherwise omit), reminder_note (only if reminder_date set), tags (array of short strings), linkedin (only if mentioned). Note: "${text}"` }]
      })
    });
    const d = await r.json();
    const parsed = JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    if(!parsed.firstname) { st.style.background = 'rgba(192,57,43,0.1)'; st.style.color = '#c0392b'; st.textContent = 'No name found — try manual.'; return; }
    const contact = { id: Date.now().toString(), created: Date.now(), contact_log: [{ date: todayStr(), note: text }], tags: [], ...parsed };
    contacts.unshift(contact); markDirty();
    document.getElementById('qc-text').value = '';
    document.getElementById('qc-existing').value = '';
    st.style.display = 'none';
    showToast('Person saved');
    showNudge(contact.id);
  } catch(e) {
    st.style.background = 'rgba(192,57,43,0.1)'; st.style.color = '#c0392b';
    st.textContent = 'Parse failed — try manual.';
  }
}

function showNudge(contactId) {
  const nudge = NUDGES[Math.floor(Math.random() * NUDGES.length)];
  const el = document.createElement('div');
  el.className = 'sheet-backdrop nudge-sheet';
  el.id = 'nudge-sheet';
  el.innerHTML = `
  <div class="sheet" style="padding-bottom:max(32px,env(safe-area-inset-bottom));">
    <div class="sheet-handle"></div>
    <div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">One quick reflection</div>
    <p style="font-size:18px;font-weight:600;line-height:1.4;margin-bottom:8px;">${nudge.q}</p>
    <p style="font-size:13px;color:var(--text-tertiary);margin-bottom:18px;line-height:1.55;">${nudge.hint}</p>

                d===0 ? `<span class="badge" style="background:#fef3cd;color:#856404;">Today</span>` :

function exportJSON() {
  if(!contacts.length) { showToast('No contacts to export'); return; }
  const blob = new Blob([JSON.stringify(contacts,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `people-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Downloaded');
}

function importJSON(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result); if(!Array.isArray(data)) throw new Error();
      const merged = {}; [...contacts,...data].forEach(c => { if(c.id) merged[c.id] = c; });
      contacts = Object.values(merged).sort((a,b)=>(b.created||0)-(a.created||0));
      markDirty(); render(); showToast(`${data.length} contacts imported`);
    } catch(e) { showToast('Invalid file'); }
  };
  reader.readAsText(file);
}

async function openPrep(id) {
  const c = contacts.find(x => x.id === id); if(!c) return;
  closeSheet();
  const cl = col(c);
  const lastLog = (c.contact_log||[]).slice(-1)[0];
  const ctx = [c.lights_up&&`What lights them up: ${c.lights_up}`, c.personal&&`Personal: ${c.personal}`, c.topics&&`Topics: ${c.topics}`, lastLog&&`Last interaction: ${lastLog.note}`, c.where&&`How we know each other: ${c.where}`].filter(Boolean);

  const el = document.createElement('div'); el.className = 'sheet-backdrop'; el.id = 'contact-sheet';
  el.innerHTML = `
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.07em;">Before you meet</div>
      <button class="btn-ghost" onclick="closeSheet()">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div class="avatar" style="width:46px;height:46px;font-size:15px;background:${cl.bg};color:${cl.fg};">${initials(c)}</div>
      <div><div style="font-size:18px;font-weight:700;">${c.firstname} ${c.lastname||''}</div><div style="font-size:13px;color:var(--text-secondary);">${[c.company,c.role].filter(Boolean).join(', ')||''}</div></div>
    </div>
    ${c.lights_up?`<div class="lights-accent" style="margin-bottom:16px;"><div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">What lights them up</div><div style="font-size:16px;line-height:1.6;">${c.lights_up}</div></div>`:''}
    ${[{l:'How you know them',v:c.where+(c.when?' · '+fmtMonth(c.when):'')},{l:'Last interaction',v:lastLog?lastLog.note:null},{l:'Topics discussed',v:!lastLog?c.topics:null},{l:'Personal',v:c.personal},{l:'Follow up on',v:c.reminder_note}].filter(x=>x.v).map(x=>`<div style="margin-bottom:16px;"><div style="font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">${x.l}</div><div style="font-size:15px;line-height:1.6;">${x.v}</div></div>`).join('')}
    ${ctx.length?`<div class="divider"></div><div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">How to make this count</div><div id="coaching" style="font-size:14px;color:var(--text-tertiary);font-style:italic;line-height:1.6;">Thinking...</div>`:''}
    ${c.linkedin?`<div class="divider"></div><button style="width:100%;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-secondary);font-size:14px;font-family:inherit;cursor:pointer;font-weight:600;" onclick="window.open('${c.linkedin}','_blank')">Open LinkedIn</button>`:''}
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target === el) closeSheet(); });

  if(ctx.length) {
    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:200, messages:[{role:'user',content:`Based on these notes about ${c.firstname}, write 2-3 short, specific, warm sentences with practical tips for the upcoming conversation — inspired by Carnegie's "How to Win Friends and Influence People". Be concrete and personal to what I know. No bullets, no headers, plain sentences. Context: ${ctx.join('. ')}`}]})});

    } catch(e) { const box = document.getElementById('coaching'); if(box) box.textContent = 'Could not load tips.'; }
  }
}

    <div class="field-gap"><p class="section-label">What we talked about</p><input id="e-to" value="${c.topics||''}" /></div>
    <div class="field-gap"><p class="section-label">Personal details</p><input id="e-pe" value="${c.personal||''}" /></div>
    <div class="field-gap"><p class="section-label" style="color:var(--accent);">What lights them up</p><input id="e-lu" value="${c.lights_up||''}" placeholder="The one thing that makes them come alive..." /></div>
    <div class="field-gap"><p class="section-label">Notes</p><textarea id="e-no" rows="3">${c.notes||''}</textarea></div>
    <div class="field-gap"><p class="section-label">LinkedIn URL</p><input id="e-li" value="${c.linkedin||''}" /></div>
    <div class="field-gap"><p class="section-label">Warmth override</p>
      <select id="e-wo"><option value="">Auto (based on last contact)</option>${['hot','warm','cold','new'].map(w=>`<option value="${w}" ${c.warmth_override===w?'selected':''}>${warmthLabel(w)}</option>`).join('')}</select>
    </div>
    <div class="field-gap"><p class="section-label">Follow-up <span style="font-weight:400;text-transform:none;font-size:11px;">— optional</span></p>
      <input type="date" id="e-rd" value="${c.reminder_date||''}" style="margin-bottom:8px;" /><input id="e-rn" value="${c.reminder_note||''}" placeholder="What to follow up on" />
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn-secondary" style="flex:1;" onclick="closeSheet()">Cancel</button>
      <button class="btn-primary" style="flex:2;" onclick="saveEdit('${c.id}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target === el) closeSheet(); });
}

function saveEdit(id) {
  const idx = contacts.findIndex(x => x.id === id); if(idx===-1) return;
  const fn = document.getElementById('e-fn').value.trim(); if(!fn) { alert('First name required'); return; }
  contacts[idx] = { ...contacts[idx], firstname:fn, lastname:document.getElementById('e-ln').value.trim(), company:document.getElementById('e-co').value.trim(), role:document.getElementById('e-ro').value.trim(), where:document.getElementById('e-wh').value.trim(), when:document.getElementById('e-wn').value, topics:document.getElementById('e-to').value.trim(), personal:document.getElementById('e-pe').value.trim(), lights_up:document.getElementById('e-lu').value.trim(), notes:document.getElementById('e-no').value.trim(), linkedin:document.getElementById('e-li').value.trim(), warmth_override:document.getElementById('e-wo').value||null, reminder_date:document.getElementById('e-rd').value, reminder_note:document.getElementById('e-rn').value.trim() };
  markDirty(); closeSheet(); render();
}

let _tt;
function showToast(msg) {
  let t = document.getElementById('_toast');
  if(!t) { t = document.createElement('div'); t.id = '_toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(_tt); _tt = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// Init
render();
loadFromDrive();
</script>
</body>
</html>
