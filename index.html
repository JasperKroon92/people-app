<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="People">
<meta name="theme-color" content="#F7F5F2">
<title>People</title>
<script>
const manifestData = {
  name: "People", short_name: "People",
  description: "Your personal relationship intelligence app",
  start_url: ".", display: "standalone",
  background_color: "#F7F5F2", theme_color: "#F7F5F2", orientation: "portrait",
  icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23f0effe'/%3E%3Ccircle cx='256' cy='200' r='80' fill='%237F77DD'/%3E%3Cellipse cx='256' cy='390' rx='130' ry='80' fill='%237F77DD'/%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const ml = document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(blob); document.head.appendChild(ml);
</script>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23f0effe'/%3E%3Ccircle cx='256' cy='200' r='80' fill='%237F77DD'/%3E%3Cellipse cx='256' cy='390' rx='130' ry='80' fill='%237F77DD'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #F7F5F2;
  --card: #ffffff;
  --card2: #f0ede8;
  --text: #1a1a1a;
  --text2: #777;
  --text3: #aaa;
  --border: rgba(0,0,0,0.08);
  --accent: #7F77DD;
  --accent-bg: #f0effe;
  --accent-text: #534AB7;
  --green: #1D9E75;
  --amber: #BA7517;
  --gray: #888780;
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 20px;
  --r-xl: 26px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1814;
    --card: #242220;
    --card2: #2e2b28;
    --text: #f0ede8;
    --text2: #999;
    --text3: #555;
    --border: rgba(255,255,255,0.08);
    --accent: #9d97e8;
    --accent-bg: #2a2840;
    --accent-text: #c4bff5;
    --green: #2DC490;
    --amber: #EF9F27;
    --gray: #888780;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
input, textarea, select { font-family: inherit; font-size: 15px; color: var(--text); background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 12px 16px; width: 100%; outline: none; -webkit-appearance: none; }
input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(127,119,221,0.12); }
textarea { resize: none; line-height: 1.6; }
button { font-family: inherit; cursor: pointer; border: none; -webkit-appearance: none; }
button:active { transform: scale(0.97); }

#app { height: 100%; display: flex; flex-direction: column; }
#screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px calc(90px + env(safe-area-inset-bottom)); padding-top: max(20px, env(safe-area-inset-top)); }

/* Bottom nav */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(70px + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--card);
  border-top: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding-top: 6px;
}
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 18px; border-radius: var(--r-md); background: transparent; border: none; cursor: pointer; font-size: 10px; font-weight: 600; color: var(--text3); font-family: inherit; letter-spacing: 0.02em; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* Buttons */
.btn-primary { background: var(--text); color: var(--bg); padding: 15px 20px; width: 100%; font-size: 15px; font-weight: 600; border-radius: var(--r-lg); }
.btn-secondary { background: var(--card); color: var(--text); border: 1.5px solid var(--border); padding: 13px 18px; border-radius: var(--r-lg); font-size: 14px; font-weight: 500; }
.btn-ghost { background: transparent; color: var(--text2); padding: 6px 10px; font-size: 14px; border-radius: var(--r-sm); }
.btn-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--text); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 300; border: none; cursor: pointer; flex-shrink: 0; }

/* Cards */
.card { background: var(--card); border-radius: var(--r-xl); padding: 18px; margin-bottom: 12px; }
.contact-card { background: var(--card); border-radius: var(--r-xl); padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.1s; }
.contact-card:active { transform: scale(0.98); }

/* Avatar */
.avatar { border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.avatar-round { border-radius: 50%; }

/* Tags & badges */
.tag { display: inline-flex; align-items: center; background: var(--accent-bg); color: var(--accent-text); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.divider { height: 1.5px; background: var(--border); margin: 16px 0; }
.field-gap { margin-bottom: 14px; }

/* Warmth */
.warmth-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.w-hot { background: var(--green); }
.w-warm { background: var(--amber); }
.w-cold { background: var(--gray); }
.w-new { background: var(--accent); }

/* Lights up accent */
.lights-accent { border-left: 3px solid var(--accent); padding: 10px 14px; background: var(--accent-bg); border-radius: 0 var(--r-sm) var(--r-sm) 0; }

/* Sheet modal */
.sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(2px); }
.sheet { background: var(--card); border-radius: 28px 28px 0 0; padding: 20px 18px; padding-bottom: calc(36px + env(safe-area-inset-bottom)); max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }

/* Save bar */
.save-bar { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.save-dot.saved { background: var(--green); }
.save-dot.saving { background: var(--amber); }
.save-dot.error { background: #c0392b; }

/* Log entries */
.log-entry { padding: 12px 14px; background: var(--bg); border-radius: var(--r-md); margin-bottom: 8px; }
.log-date { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.log-text { font-size: 13px; line-height: 1.6; color: var(--text2); }

/* Toast */
.toast { position: fixed; bottom: calc(84px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 600; z-index: 200; white-space: nowrap; transition: opacity 0.3s; pointer-events: none; }

/* Page header */
.page-header { padding-top: 4px; margin-bottom: 20px; display: flex; align-items: flex-start; justify-content: space-between; }
.page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.page-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; }

/* Filter pills */
.filter-row { display: flex; gap: 8px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-pill { padding: 7px 16px; border-radius: 24px; border: 1.5px solid var(--border); background: var(--card); font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
.filter-pill.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); }

/* Prep rows */
.prep-section { margin-bottom: 18px; }
.prep-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.prep-val { font-size: 15px; line-height: 1.6; color: var(--text); }
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-capture" onclick="goTo('capture')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Capture
    </button>
    <button class="nav-btn" id="nav-people" onclick="goTo('people')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      People
    </button>
    <button class="nav-btn" id="nav-followups" onclick="goTo('followups')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Follow-ups
    </button>
    <button class="nav-btn" id="nav-settings" onclick="goTo('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<script>
const DRIVE_FILENAME = 'people-app-data.json';
const CACHE_KEY = 'ppl_v4_data';
let contacts = [];
let currentView = 'capture';
let driveFileId = null;
let isDirty = false;
let isSaving = false;
let lastSaved = null;
let saveStatusEl = null;
let saveDotEl = null;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const PALETTES = [
  {bg:'#EEEDFE',fg:'#534AB7'},{bg:'#E1F5EE',fg:'#0F6E56'},
  {bg:'#FAECE7',fg:'#993C1D'},{bg:'#E6F1FB',fg:'#185FA5'},
  {bg:'#FBEAF0',fg:'#993556'},{bg:'#FAEEDA',fg:'#854F0B'},
  {bg:'#EAF3DE',fg:'#3B6D11'},{bg:'#F1EFE8',fg:'#5F5E5A'}
];
const PALETTES_DARK = [
  {bg:'#2a2840',fg:'#c4bff5'},{bg:'#0d2a20',fg:'#5DCAA5'},
  {bg:'#2a1a10',fg:'#F0997B'},{bg:'#0d1f35',fg:'#85B7EB'},
  {bg:'#2a1020',fg:'#ED93B1'},{bg:'#2a1e05',fg:'#EF9F27'},
  {bg:'#182205',fg:'#97C459'},{bg:'#1e1e1c',fg:'#B4B2A9'}
];

const NUDGES = [
  { q: "What did they seem most enthusiastic about?", hint: "People's passions reveal what makes them feel important." },
  { q: "Did you learn something they're genuinely proud of?", hint: "Remembering achievements makes people feel truly seen." },
  { q: "Was there a moment they really lit up?", hint: "That's usually the thing worth remembering most." },
  { q: "What did you two have in common?", hint: "Genuine common ground is the fastest way to build trust." },
  { q: "Did you let them talk more than you?", hint: "The best conversationalists are the best listeners." },
];

function todayStr() { return new Date().toISOString().split('T')[0]; }
function isDark() { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
function pal(c) {
  const i = Math.abs(((c.firstname||'A').charCodeAt(0) + (c.lastname||'').charCodeAt(0))) % PALETTES.length;
  return isDark() ? PALETTES_DARK[i] : PALETTES[i];
}
function initials(c) { return (((c.firstname||'')[0]||'') + ((c.lastname||'')[0]||'')).toUpperCase(); }
function fmtMonth(w) { if(!w) return ''; const [y,m] = w.split('-'); return `${MONTHS[parseInt(m)-1]} ${y}`; }
function daysAgo(d) { if(!d) return null; return Math.round((Date.now() - new Date(d).getTime()) / 86400000); }
function daysUntil(d) { if(!d) return null; const t = new Date(); t.setHours(0,0,0,0); const u = new Date(d); u.setHours(0,0,0,0); return Math.round((u - t) / 86400000); }
function warmth(c) {
  if(c.warmth_override) return c.warmth_override;
  const log = c.contact_log || [];
  if(!log.length) return 'new';
  const da = daysAgo(log[log.length-1].date);
  if(da <= 30) return 'hot'; if(da <= 90) return 'warm'; return 'cold';
}
function warmthLabel(w) { return {hot:'Active',warm:'Warm',cold:'Cold',new:'New'}[w]||'New'; }
function warmthClass(w) { return {hot:'w-hot',warm:'w-warm',cold:'w-cold',new:'w-new'}[w]||'w-new'; }

function setSaveStatus(status, text) {
  if(saveDotEl) saveDotEl.className = 'save-dot ' + status;
  if(saveStatusEl) saveStatusEl.textContent = text;
}

async function callClaude(prompt, maxTokens = 2000) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514', max_tokens: maxTokens,
      mcp_servers: [{ type: 'url', url: 'https://drive.mcp.claude.com/mcp', name: 'gdrive' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const d = await r.json();
  return (d.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
}

async function findOrCreateFile() {
  const text = await callClaude(`Search my Google Drive for a file named exactly "${DRIVE_FILENAME}". If found return ONLY JSON {"found":true,"id":"FILE_ID"}. If not found, create it with content [] and return ONLY JSON {"found":false,"id":"NEW_ID"}. Raw JSON only.`);
  const json = JSON.parse(text.replace(/```json|```/g,'').trim());
  driveFileId = json.id;
  return json;
}

async function loadFromDrive() {
  setSaveStatus('saving', 'Connecting...');
  try {
    const result = await findOrCreateFile();
    if(result.found) {
      const text = await callClaude(`Read contents of Google Drive file ID "${driveFileId}". Return ONLY the raw file content.`);
      try { const p = JSON.parse(text.replace(/```json|```/g,'').trim()); contacts = Array.isArray(p) ? p : []; } catch(e) { contacts = []; }
    } else { contacts = []; }
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e) {}
    setSaveStatus('saved', 'Synced'); lastSaved = Date.now();
  } catch(e) {
    setSaveStatus('error', 'Using local cache');
    try { const c = localStorage.getItem(CACHE_KEY); if(c) contacts = JSON.parse(c); } catch(e2) { contacts = []; }
  }
  render();
}

async function saveToDrive(manual = false) {
  if(!isDirty && !manual) return;
  if(isSaving) return;
  isSaving = true; setSaveStatus('saving', 'Saving...');
  try {
    if(!driveFileId) await findOrCreateFile();
    await callClaude(`Update Google Drive file ID "${driveFileId}" replacing all content with: ${JSON.stringify(contacts)}. Confirm done.`);
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e) {}
    isDirty = false; lastSaved = Date.now(); setSaveStatus('saved', 'Saved');
    if(manual) showToast('Saved to Drive ✓');
  } catch(e) {
    setSaveStatus('error', 'Save failed');
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e2) {}
    if(manual) showToast('Drive failed — cached locally');
  } finally { isSaving = false; }
}

function markDirty() {
  isDirty = true; setSaveStatus('saving', 'Unsaved');
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(contacts)); } catch(e) {}
}

function goTo(view) {
  if(isDirty && view !== currentView) saveToDrive();
  currentView = view;
  ['capture','people','followups','settings'].forEach(v => {
    document.getElementById('nav-' + v).classList.toggle('active', v === view);
  });
  render();
}

function render() {
  const s = document.getElementById('screen');
  if(currentView === 'capture') s.innerHTML = renderCapture();
  else if(currentView === 'people') s.innerHTML = renderPeople();
  else if(currentView === 'followups') s.innerHTML = renderFollowups();
  else if(currentView === 'settings') s.innerHTML = renderSettings();
  saveStatusEl = document.getElementById('save-label');
  saveDotEl = document.getElementById('save-dot');
}

function renderSaveBar() {
  const txt = lastSaved ? `Saved ${new Date(lastSaved).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}` : (isDirty ? 'Unsaved changes' : 'Loading...');
  const cls = lastSaved && !isDirty ? 'saved' : (isDirty ? 'saving' : '');
  return `<div class="save-bar"><span class="save-dot ${cls}" id="save-dot"></span><span id="save-label" style="font-size:11px;color:var(--text3);">${txt}</span></div>`;
}

function renderCapture() {
  return `
  <div class="page-header">
    <div>
      <div class="page-title">Quick capture</div>
      <div class="page-subtitle">Who did you just meet?</div>
      ${renderSaveBar()}
    </div>
  </div>
  <div class="card">
    <textarea id="qc-text" rows="5" placeholder="Met Sarah at a dinner in Tribeca — she's an architect, originally from Rotterdam, has a young daughter. We talked about the Hudson Yards development." style="border:none;background:transparent;padding:0;font-size:15px;line-height:1.7;"></textarea>
  </div>
  <div class="field-gap">
    <input type="text" id="qc-existing" placeholder="Add to existing contact (optional)" oninput="showSuggestions(this.value)" autocomplete="off" />
  </div>
  <div id="qc-sugg" style="margin-bottom:8px;"></div>
  <div id="qc-status" style="font-size:13px;padding:12px 16px;border-radius:var(--r-md);margin-bottom:14px;display:none;"></div>
  <div style="display:flex;gap:10px;">
    <button class="btn-primary" style="flex:1;" onclick="doCapture()">Save with AI ↗</button>
    <button class="btn-secondary" onclick="openManual()">Manual</button>
  </div>`;
}

function showSuggestions(val) {
  const box = document.getElementById('qc-sugg');
  if(!val || val.length < 2) { box.innerHTML = ''; return; }
  const q = val.toLowerCase();
  const m = contacts.filter(c => `${c.firstname} ${c.lastname} ${c.company||''}`.toLowerCase().includes(q)).slice(0,3);
  if(!m.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-md);overflow:hidden;">` +
    m.map(c => `<div style="padding:13px 16px;cursor:pointer;font-size:14px;" onclick="pickExisting('${c.id}','${c.firstname} ${c.lastname}')">${c.firstname} ${c.lastname}${c.company?' · '+c.company:''}</div>`).join(`<div style="height:1px;background:var(--border);"></div>`) +
    `</div>`;
}

let selId = null;
function pickExisting(id, name) {
  selId = id;
  document.getElementById('qc-existing').value = name;
  document.getElementById('qc-sugg').innerHTML = '';
}

async function doCapture() {
  const text = document.getElementById('qc-text').value.trim();
  if(!text) return;
  const st = document.getElementById('qc-status');
  st.style.display = 'block';
  st.style.background = 'var(--accent-bg)';
  st.style.color = 'var(--accent)';
  st.textContent = 'Parsing with AI...';

  if(selId) {
    const idx = contacts.findIndex(x => x.id === selId);
    if(idx > -1) {
      if(!contacts[idx].contact_log) contacts[idx].contact_log = [];
      contacts[idx].contact_log.push({ date: todayStr(), note: text });
      markDirty(); selId = null;
      document.getElementById('qc-text').value = '';
      document.getElementById('qc-existing').value = '';
      st.style.display = 'none';
      showToast('Note added ✓'); return;
    }
  }

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`Extract info from this note about a person I just met. Today is ${todayStr()}. Return ONLY valid JSON: firstname, lastname, company, role, where (how/where we met), when (YYYY-MM if mentioned), topics (plain string), personal (family/hobbies/background, plain string), notes, reminder_date (YYYY-MM-DD ONLY if explicit follow-up mentioned, otherwise omit), reminder_note (only if reminder_date set), tags (array of short strings), linkedin (only if mentioned). Note: "${text}"`}]
      })
    });
    const d = await r.json();
    const parsed = JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    if(!parsed.firstname) { st.style.background='rgba(192,57,43,0.1)'; st.style.color='#c0392b'; st.textContent='No name found — try manual.'; return; }
    const contact = { id:Date.now().toString(), created:Date.now(), contact_log:[{date:todayStr(),note:text}], tags:[], ...parsed };
    contacts.unshift(contact); markDirty();
    document.getElementById('qc-text').value = '';
    document.getElementById('qc-existing').value = '';
    st.style.display = 'none';
    showToast('Person saved ✓');
    showNudge(contact.id);
  } catch(e) {
    st.style.background='rgba(192,57,43,0.1)'; st.style.color='#c0392b';
    st.textContent='Parse failed — try manual.';
  }
}

function renderFollowups() {

  const sections = [
    {title:'Overdue', items:due.filter(x=>x.d<0)},
    {title:'Today', items:due.filter(x=>x.d===0)},
    {title:'Next 2 weeks', items:due.filter(x=>x.d>0&&x.d<=14)},
    {title:'Later', items:due.filter(x=>x.d>14)},

  function row({c,d}) {
    const p = pal(c);
    const badge = d<0 ? `<span class="badge" style="background:#fde;color:#c0392b;">${Math.abs(d)}d late</span>` :
                  d===0 ? `<span class="badge" style="background:#fef3cd;color:#856404;">Today</span>` :
                  `<span class="badge" style="background:#d4edda;color:#155724;">In ${d}d</span>`;

function exportJSON() {
  if(!contacts.length) { showToast('No contacts to export'); return; }
  const blob = new Blob([JSON.stringify(contacts,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`people-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Downloaded ✓');
}

function importJSON(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result); if(!Array.isArray(data)) throw new Error();
      const merged = {}; [...contacts,...data].forEach(c=>{if(c.id) merged[c.id]=c;});
      contacts = Object.values(merged).sort((a,b)=>(b.created||0)-(a.created||0));
      markDirty(); render(); showToast(`${data.length} contacts imported ✓`);
    } catch(e) { showToast('Invalid file'); }
  };
  reader.readAsText(file);
}

  const ctx = [c.lights_up&&`What lights them up: ${c.lights_up}`, c.personal&&`Personal: ${c.personal}`, c.topics&&`Topics: ${c.topics}`, lastLog&&`Last interaction: ${lastLog.note}`, c.where&&`How we know each other: ${c.where}`].filter(Boolean);

  const el = document.createElement('div'); el.className='sheet-backdrop'; el.id='contact-sheet';
  el.innerHTML = `
  <div class="sheet">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;">Before you meet</div>

    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;">
      <div class="avatar" style="width:50px;height:50px;font-size:16px;background:${p.bg};color:${p.fg};">${initials(c)}</div>
      <div><div style="font-size:20px;font-weight:700;letter-spacing:-0.3px;">${c.firstname} ${c.lastname||''}</div><div style="font-size:13px;color:var(--text2);margin-top:2px;">${[c.company,c.role].filter(Boolean).join(', ')||''}</div></div>
    </div>
    ${c.lights_up?`<div class="lights-accent" style="margin-bottom:20px;"><div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;">What lights them up</div><div style="font-size:17px;line-height:1.6;font-weight:500;">${c.lights_up}</div></div>`:''}
    ${[{l:'How you know them',v:c.where+(c.when?' · '+fmtMonth(c.when):'')},{l:'Last interaction',v:lastLog?lastLog.note:null},{l:'Topics discussed',v:!lastLog?c.topics:null},{l:'Personal',v:c.personal},{l:'Follow up on',v:c.reminder_note}].filter(x=>x.v).map(x=>`<div class="prep-section"><div class="prep-label">${x.l}</div><div class="prep-val">${x.v}</div></div>`).join('')}
    ${ctx.length?`<div class="divider"></div><div style="font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">How to make this count</div><div id="coaching" style="font-size:14px;color:var(--text3);font-style:italic;line-height:1.7;">Thinking...</div>`:''}
    ${c.linkedin?`<div class="divider"></div><button style="width:100%;padding:15px;border-radius:var(--r-lg);border:none;background:var(--accent-bg);color:var(--accent-text);font-size:14px;font-family:inherit;cursor:pointer;font-weight:700;" onclick="window.open('${c.linkedin}','_blank')">Open LinkedIn</button>`:''}

      <div><p class="section-label">Last name</p><input id="e-ln" value="${c.lastname||''}" /></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" class="field-gap">
      <div><p class="section-label">Company</p><input id="e-co" value="${c.company||''}" /></div>
      <div><p class="section-label">Role</p><input id="e-ro" value="${c.role||''}" /></div>
    </div>
    <div class="field-gap"><p class="section-label">Where we met</p><input id="e-wh" value="${c.where||''}" /></div>
    <div class="field-gap"><p class="section-label">When</p><input type="month" id="e-wn" value="${c.when||''}" /></div>
    <div class="field-gap"><p class="section-label">What we talked about</p><input id="e-to" value="${c.topics||''}" /></div>
    <div class="field-gap"><p class="section-label">Personal details</p><input id="e-pe" value="${c.personal||''}" /></div>
    <div class="field-gap"><p class="section-label" style="color:var(--accent);">What lights them up</p><input id="e-lu" value="${c.lights_up||''}" placeholder="The one thing that makes them come alive..." /></div>
    <div class="field-gap"><p class="section-label">Notes</p><textarea id="e-no" rows="3">${c.notes||''}</textarea></div>
    <div class="field-gap"><p class="section-label">LinkedIn URL</p><input id="e-li" value="${c.linkedin||''}" /></div>
    <div class="field-gap"><p class="section-label">Warmth override</p>
      <select id="e-wo"><option value="">Auto (based on last contact)</option>${['hot','warm','cold','new'].map(w=>`<option value="${w}" ${c.warmth_override===w?'selected':''}>${warmthLabel(w)}</option>`).join('')}</select>
    </div>
    <div class="field-gap"><p class="section-label">Follow-up <span style="font-weight:400;text-transform:none;">— optional</span></p>
      <input type="date" id="e-rd" value="${c.reminder_date||''}" style="margin-bottom:8px;" /><input id="e-rn" value="${c.reminder_note||''}" placeholder="What to follow up on" />
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn-secondary" style="flex:1;" onclick="closeSheet()">Cancel</button>
      <button class="btn-primary" style="flex:2;" onclick="saveEdit('${c.id}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target===el) closeSheet(); });
}

function saveEdit(id) {
  const idx = contacts.findIndex(x=>x.id===id); if(idx===-1) return;
  const fn = document.getElementById('e-fn').value.trim(); if(!fn) { alert('First name required'); return; }
  contacts[idx] = {...contacts[idx],firstname:fn,lastname:document.getElementById('e-ln').value.trim(),company:document.getElementById('e-co').value.trim(),role:document.getElementById('e-ro').value.trim(),where:document.getElementById('e-wh').value.trim(),when:document.getElementById('e-wn').value,topics:document.getElementById('e-to').value.trim(),personal:document.getElementById('e-pe').value.trim(),lights_up:document.getElementById('e-lu').value.trim(),notes:document.getElementById('e-no').value.trim(),linkedin:document.getElementById('e-li').value.trim(),warmth_override:document.getElementById('e-wo').value||null,reminder_date:document.getElementById('e-rd').value,reminder_note:document.getElementById('e-rn').value.trim()};
  markDirty(); closeSheet(); render();
}

let _tt;
function showToast(msg) {
  let t = document.getElementById('_toast');
  if(!t) { t=document.createElement('div'); t.id='_toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(_tt); _tt=setTimeout(()=>{t.style.opacity='0';},2500);
}

render();
loadFromDrive();
</script>
</body>
</html>
